name: Build on HEAD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Import code signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_P12" ]; then
            echo "ERROR: CERTIFICATE_P12 secret is not set."
            exit 1
          fi

          CERT_FILE=$(mktemp)
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_FILE"

          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security list-keychains -s "$KEYCHAIN" login.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"

          security import "$CERT_FILE" \
            -k "$KEYCHAIN" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -f pkcs12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f "$CERT_FILE"

          echo "Available signing identities:"
          security find-identity -v -p codesigning

      - name: Build signed DMG
        env:
          VERSION: head
        run: |
          make dmg
          echo "── codesign verification ──"
          codesign --verify --deep --strict --verbose=2 Lumesent.app

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          DMG_FILE="Lumesent-head.dmg"

          SIGN_TOOL=$(find .build/artifacts -name "sign_update" -type f | head -1)
          if [ -z "$SIGN_TOOL" ]; then
            echo "ERROR: sign_update not found in Sparkle artifacts"
            exit 1
          fi
          chmod +x "$SIGN_TOOL"

          SPARKLE_SIG=$("$SIGN_TOOL" "$DMG_FILE" --ed-key-file <(echo "$SPARKLE_EDDSA_KEY"))
          echo "SPARKLE_SIG=$SPARKLE_SIG" >> "$GITHUB_ENV"

          DMG_SIZE=$(stat -f%z "$DMG_FILE")
          echo "DMG_SIZE=$DMG_SIZE" >> "$GITHUB_ENV"

      - name: Update head release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG_FILE="Lumesent-head.dmg"

          if [ ! -f "$DMG_FILE" ]; then
            echo "ERROR: $DMG_FILE not found"
            ls -la *.dmg 2>/dev/null || echo "No DMG files found"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          TITLE="Lumesent HEAD (${SHORT_SHA})"
          NOTES="Built from \`main\` at ${GITHUB_SHA}

          Commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          # Generate appcast for head channel
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/head/${DMG_FILE}"
          PUB_DATE=$(date -R)

          cat > appcast-head.xml <<APPCAST_EOF
<?xml version="1.0" encoding="utf-8"?>
<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
  <channel>
    <title>Lumesent Updates (Head)</title>
    <link>https://github.com/${{ github.repository }}/releases/download/head/appcast-head.xml</link>
    <item>
      <title>Head (${SHORT_SHA})</title>
      <pubDate>${PUB_DATE}</pubDate>
      <enclosure
        url="${DMG_URL}"
        ${SPARKLE_SIG}
        type="application/octet-stream" />
      <sparkle:version>head-${SHORT_SHA}</sparkle:version>
      <sparkle:shortVersionString>head-${SHORT_SHA}</sparkle:shortVersionString>
      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
    </item>
  </channel>
</rss>
APPCAST_EOF

          # Delete existing head release (if any), then recreate
          gh release delete head --yes --cleanup-tag 2>/dev/null || true
          gh release create head \
            "$DMG_FILE" \
            appcast-head.xml \
            --title "$TITLE" \
            --notes "$NOTES" \
            --prerelease
